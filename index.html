<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Icons & Emoji — kohid CDN</title>
    <meta name="description" content="Browse 18,000+ icons and emoji served from a free CDN. Microsoft Fluent Emoji + Google Material Symbols Light.">
    <link rel="icon" href="https://cdn.jsdelivr.net/gh/kohid/icons@main/fluent-emoji/svg/grinning-face.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0..1,0&family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0..1,0&family=Material+Symbols+Sharp:opsz,wght,FILL,GRAD@24,400,0..1,0">
    <link rel="stylesheet" href="browser/style.css">
</head>
<body>
    <header class="topbar">
        <div class="brand">
            <span class="brand-mark">●</span>
            <span class="brand-name">kohid icons</span>
        </div>
        <div class="search">
            <input type="search" id="search" placeholder="Search icons & emoji" autocomplete="off" spellcheck="false">
        </div>
        <div class="topbar-actions">
            <a href="https://github.com/kohid/icons" target="_blank" rel="noopener" class="ghost-btn">GitHub</a>
            <button id="theme-toggle" class="ghost-btn" type="button" aria-label="Toggle theme">🌙</button>
        </div>
    </header>

    <nav class="tabs" role="tablist">
        <button class="tab is-active" type="button" role="tab" data-set="fluent-emoji">Fluent Emoji</button>
        <button class="tab" type="button" role="tab" data-set="material-symbols-light">Material Symbols</button>
    </nav>

    <main class="layout">
        <aside class="sidebar" id="categories" aria-label="Categories"></aside>

        <section class="content">
            <div class="grid" id="grid" aria-live="polite"></div>
            <div class="empty" id="empty" hidden>No icons match your search.</div>
        </section>

        <aside class="drawer" id="drawer" aria-hidden="true">
            <button class="drawer-close" id="drawer-close" type="button" aria-label="Close">✕</button>
            <div class="drawer-body" id="drawer-body"></div>
        </aside>
    </main>

    <footer class="sitefoot">
        <span id="stats">Loading…</span>
        <span class="sep">·</span>
        <span>Fluent Emoji © Microsoft (MIT)</span>
        <span class="sep">·</span>
        <span>Material Symbols © Google (Apache 2.0)</span>
    </footer>

    <script src="browser/app.js"></script>
</body>
</html>
